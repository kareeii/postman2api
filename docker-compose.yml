services:
  postman2api:
    build: .
    ports:
      - "1930:1930"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=1930
      - API_KEY=postman2api-secret-key
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6}
      - DATABASE_PATH=/app/data/postman2api.db
      - CAMOUFOX_HEADLESS=true
    restart: unless-stopped
